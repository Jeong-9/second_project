<!-- 정서현: 스템프판을 만들기 위해 필요한 코드  -->

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>출석체크 스탬프판 - KYUBOBOOK</title>
<style>
  :root {
    --cream:#FAF7F2;
    --warm-white:#FEFCF8;
    --ink:#1A1410;
    --accent:#C8472B;
    --gold:#D4A853;
    --muted:#8C7B6E;
    --light-border:#E8E0D5;
  }

  * {
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  body {
    background:var(--cream);
    font-family:'Malgun Gothic', sans-serif;
    color:var(--ink);
  }

  header {
    background:var(--warm-white);
    border-bottom:2px solid var(--ink);
    padding:18px 40px;
  }

  .header-inner {
    max-width:1180px;
    margin:0 auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  .logo {
    font-size:26px;
    font-weight:800;
    text-decoration:none;
    color:var(--ink);
  }

  .logo span {
    color:var(--accent);
  }

  .back-link {
    color:var(--ink);
    text-decoration:none;
    border:1px solid var(--ink);
    padding:9px 16px;
    font-size:13px;
    font-weight:700;
    background:white;
  }

  .back-link:hover {
    background:var(--ink);
    color:white;
  }

  .wrap {
    max-width:1180px;
    margin:36px auto 70px;
    padding:0 24px;
  }

  .page-title {
    margin-bottom:24px;
  }

  .page-title h1 {
    font-size:30px;
    margin-bottom:8px;
  }

  .page-title p {
    color:var(--muted);
    font-size:14px;
  }

  .summary-grid {
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:16px;
    margin-bottom:24px;
  }

  .summary-card {
    background:white;
    border:1px solid var(--light-border);
    padding:22px;
    text-align:center;
  }

  .summary-card strong {
    display:block;
    font-size:28px;
    color:var(--accent);
    margin-bottom:6px;
  }

  .summary-card span {
    color:var(--muted);
    font-size:13px;
  }

  .calendar-card {
    background:white;
    border:1px solid var(--light-border);
    padding:30px;
  }

  .calendar-head {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:22px;
  }

  .month-title {
    font-size:24px;
    font-weight:800;
  }

  .month-nav {
    display:flex;
    gap:8px;
  }

  .month-nav button {
    border:1px solid var(--ink);
    background:white;
    padding:8px 14px;
    cursor:pointer;
    font-weight:700;
  }

  .month-nav button:hover {
    background:var(--ink);
    color:white;
  }

  .bonus-info {
    background:var(--cream);
    border-left:5px solid var(--gold);
    padding:16px 20px;
    margin-bottom:22px;
    font-size:14px;
    line-height:1.8;
  }

  .bonus-info strong {
    color:var(--accent);
  }

  .week-row {
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:10px;
    margin-bottom:10px;
  }

  .week-cell {
    text-align:center;
    color:var(--muted);
    font-size:13px;
    font-weight:700;
    padding:8px 0;
  }

  .calendar-grid {
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:10px;
  }

  .day-cell {
    min-height:96px;
    border:1px solid var(--light-border);
    background:var(--warm-white);
    padding:10px;
    position:relative;
  }

  .day-cell.empty {
    background:transparent;
    border:none;
  }

  .day-num {
    font-size:13px;
    font-weight:700;
    color:var(--muted);
  }

  .day-cell.checked {
    border:2px solid var(--accent);
    background:#FFF7F3;
  }

  .stamp {
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%, -45%) rotate(-12deg);
    width:56px;
    height:56px;
    border-radius:50%;
    border:3px solid var(--accent);
    color:var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:900;
  }

  .bonus-badge {
  position:absolute;
  right:6px;
  bottom:6px;
  background:var(--gold);
  color:white;
  font-size:11px;
  font-weight:800;
  padding:4px 7px;
  border-radius:10px;
}

  /* 정서현 담당 기능: 출석 전 보상 미리보기 표시 */
.reward-preview,
.reward-done {
  position:absolute;
  right:8px;
  bottom:8px;
  left:auto;
  font-size:11px;
  font-weight:700;
  padding:4px 8px;
  border-radius:12px;
  z-index:2;
}

.reward-preview {
  color:var(--muted);
  background:#F4EEE7;
  border:1px solid var(--light-border);
}

/* 7, 14, 21, 28일 보너스 예정일 표시 */
.reward-preview.bonus-reward {
  color:#8A4B00;
  background:#FFE7A3;
  border:1px solid #D4A853;
  font-weight:900;
  box-shadow:0 0 0 2px rgba(212,168,83,0.18);
}

/*보너스 칸 강조*/
.day-cell.bonus-plan {
  background:#FFF9E8;
  border:2px solid #D4A853;
}

/* 출석 완료 후 지급 표시 */
.reward-done {
  color:#2E7D32;
  background:#EEF8EF;
  border:1px solid #CDE8D0;
}

/* 보너스 출석 도장: 도장 모양은 유지하고 색만 변경 */
.stamp.bonus-stamp {
  border-color:var(--gold);
  color:#B56A00;
  background:#FFF8DF;
}

/* 보너스 예정일 칸 강조 */
.day-cell.bonus-plan {
  background:#FFFDF5;
  border-color:#E8D39B;
}

  /* TODAY는 왼쪽 아래로 고정해서 포인트 문구와 겹치지 않게 함 */
.today-mark {
  position:absolute;
  left:8px;
  bottom:8px;
  font-size:11px;
  color:var(--ink);
  font-weight:800;
  z-index:3;
}

  .check-box {
    margin-top:24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--ink);
    color:white;
    padding:22px 26px;
  }

  .check-box div {
    line-height:1.8;
  }

  .check-btn {
    border:none;
    background:var(--gold);
    color:var(--ink);
    padding:13px 26px;
    font-weight:900;
    cursor:pointer;
  }

  .check-btn:disabled {
    background:#aaa;
    color:white;
    cursor:not-allowed;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">KYUBO<span>BOOK</span></a>
    <a href="/" class="back-link">홈으로</a>
  </div>
</header>

<div class="wrap">
  <div class="page-title">
    <h1>📅 출석체크 스탬프판</h1>
    <p>매일 출석하면 100P, 연속 7일마다 보너스 500P를 받을 수 있어요.</p>
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <strong id="my-point">0P</strong>
      <span>보유 포인트</span>
    </div>
    <div class="summary-card">
      <strong id="my-streak">0일</strong>
      <span>현재 연속 출석</span>
    </div>
    <div class="summary-card">
      <strong id="my-total">0회</strong>
      <span>총 출석 횟수</span>
    </div>
  </div>

  <div class="calendar-card">
    <div class="calendar-head">
      <div class="month-title" id="month-title">0000년 00월</div>
      <div class="month-nav">
        <button type="button" onclick="moveMonth(-1)">이전 달</button>
        <button type="button" onclick="goToday()">이번 달</button>
        <button type="button" onclick="moveMonth(1)">다음 달</button>
      </div>
    </div>

    <div class="bonus-info">
      ✅ 기본 출석 보상: <strong>매일 100P</strong><br>
      🎁 연속 출석 보너스: <strong>연속 출석 7일마다 500P 추가 지급</strong>
    </div>

    <div class="week-row">
      <div class="week-cell">일</div>
      <div class="week-cell">월</div>
      <div class="week-cell">화</div>
      <div class="week-cell">수</div>
      <div class="week-cell">목</div>
      <div class="week-cell">금</div>
      <div class="week-cell">토</div>
    </div>

    <div class="calendar-grid" id="calendar-grid"></div>

    <div class="check-box">
      <div>
        <strong>오늘도 KYUBOBOOK에 오신 걸 환영합니다!</strong><br>
        하루 한 번 출석하고 포인트를 받아보세요.
      </div>
      <button class="check-btn" id="attendance-btn" onclick="checkAttendance()">출석체크하기</button>
    </div>
  </div>
</div>

<script>
let currentDate = new Date();
let attendanceMap = {};
let bonusMap = {};
let todayStr = '';
let currentStreak = 0;
let lastAttendanceDateStr = null;

function formatDate(year, month, day) {
  return year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
}

function loadMonthData() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth() + 1;

  fetch(`/attendance/month-data?year=${year}&month=${month}`)
    .then(res => res.json())
    .then(data => {
      if (!data.success) {
        alert(data.message || '출석 정보를 불러오지 못했습니다.');
        return;
      }

      document.getElementById('my-point').textContent = data.point.toLocaleString() + 'P';
      document.getElementById('my-streak').textContent = data.streak + '일';
      document.getElementById('my-total').textContent = data.total_count + '회';
      
      /*5월 1일 오류 수정 : user02 출석일에 따른 포인트 총 값이 이상함*/
      currentStreak = data.streak || 0;
      lastAttendanceDateStr = data.last_attendance_date || null;

      attendanceMap = {};
      bonusMap = {};

      data.attendance.forEach(item => {
        attendanceMap[item.date] = item;

        if (item.bonus_point > 0) {
          bonusMap[item.date] = true;
        }
      });

      renderCalendar(year, month);
    })
    .catch(() => {
      alert('출석 정보를 불러오는 중 오류가 발생했습니다.');
    });
}

function renderCalendar(year, month) {
  const grid = document.getElementById('calendar-grid');
  const title = document.getElementById('month-title');

  title.textContent = `${year}년 ${month}월`;
  grid.innerHTML = '';

  const firstDay = new Date(year, month - 1, 1);
  const lastDay = new Date(year, month, 0);
  const startWeek = firstDay.getDay();
  const totalDays = lastDay.getDate();

  const realToday = new Date();
  todayStr = formatDate(realToday.getFullYear(), realToday.getMonth() + 1, realToday.getDate());

  for (let i = 0; i < startWeek; i++) {
    const empty = document.createElement('div');
    empty.className = 'day-cell empty';
    grid.appendChild(empty);
  }

 // 정서현 담당 기능: 전체 첫 출석일 기준 보너스 예정일 계산
const realTodayDate = new Date(realToday.getFullYear(), realToday.getMonth(), realToday.getDate());

function toDateOnly(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function getNextBonusDates(year, month) {
  const result = [];

  if (!lastAttendanceDateStr || currentStreak <= 0) return result;

  const lastDate = toDateOnly(lastAttendanceDateStr);
  const todayOnly = new Date(realToday.getFullYear(), realToday.getMonth(), realToday.getDate());
  const yesterdayOnly = new Date(todayOnly);
  yesterdayOnly.setDate(todayOnly.getDate() - 1);

  // 연속 출석이 이미 끊긴 상태면 예정 칸 표시 안 함
  // 단, 오늘 출석했거나 어제 출석해서 streak가 이어지는 경우만 예정일 계산
  const isActiveStreak =
    lastDate.getTime() === todayOnly.getTime() ||
    lastDate.getTime() === yesterdayOnly.getTime();

  if (!isActiveStreak) return result;

  // 다음 보너스까지 남은 일수 계산
  let daysUntilNextBonus = 7 - (currentStreak % 7);
  if (daysUntilNextBonus === 7) daysUntilNextBonus = 0;

  let nextBonusDate = new Date(lastDate);
  nextBonusDate.setDate(nextBonusDate.getDate() + daysUntilNextBonus);

  const viewStart = new Date(year, month - 1, 1);
  const viewEnd = new Date(year, month, 1);

  while (nextBonusDate < viewStart) {
    nextBonusDate.setDate(nextBonusDate.getDate() + 7);
  }

  while (nextBonusDate < viewEnd) {
    result.push(formatDate(
      nextBonusDate.getFullYear(),
      nextBonusDate.getMonth() + 1,
      nextBonusDate.getDate()
    ));
    nextBonusDate.setDate(nextBonusDate.getDate() + 7);
  }

  return result;
}

const nextBonusDates = new Set(getNextBonusDates(year, month));

function isBonusTargetDay(dateStr) {
  return nextBonusDates.has(dateStr);
}

  for (let day = 1; day <= totalDays; day++) {
    const dateStr = formatDate(year, month, day);
    const cell = document.createElement('div');
    cell.className = 'day-cell';

    if (attendanceMap[dateStr]) {
      cell.classList.add('checked');
    }

// 첫 출석일 기준 7일차, 14일차, 21일차, 28일차인지 확인
const isBonusPlanDay = isBonusTargetDay(dateStr);

if (isBonusPlanDay) {
  cell.classList.add('bonus-plan');
}

let html = `<div class="day-num">${day}</div>`;
// 정서현 : 첫 출석일 전 날짜 → 빈칸
// 첫 출석일 이후 일반 날짜 → 출석 시 +100P
// 첫 출석일 이후 7일 간격 날짜 → 출석 시 +500P
const cellDate = new Date(year, month - 1, day);
const isFutureOrToday = cellDate >= realTodayDate;

// 출석한 날은 DB 기준으로 예정일만 현제 steak 기준으로 표시
// 5월 1일 달력 칸 문구 수정 : 보너스 +500P
if (attendanceMap[dateStr]) {
  if ((attendanceMap[dateStr].bonus_point || 0) > 0) {
    html += `<div class="stamp bonus-stamp">출석</div>`;
    html += `<div class="reward-done">보너스 +500P</div>`;
  } else {
    html += `<div class="stamp">출석</div>`;
    html += `<div class="reward-done">100P 지급</div>`;
  }
} else {
  if (isFutureOrToday) {
    if (isBonusPlanDay) {
      html += `<div class="reward-preview bonus-reward">출석 시 +500P</div>`;
    } else {
      html += `<div class="reward-preview">출석 시 +100P</div>`;
    }
  }
}

if (dateStr === todayStr) {
  html += `<div class="today-mark">TODAY</div>`;
}

    cell.innerHTML = html;
    grid.appendChild(cell);
  }

  updateTodayButton();
}

function updateTodayButton() {
  const btn = document.getElementById('attendance-btn');

  if (!btn) return;

  if (attendanceMap[todayStr]) {
    btn.textContent = '오늘 출석 완료';
    btn.disabled = true;
  } else {
    btn.textContent = '출석체크하기';
    btn.disabled = false;
  }
}

function checkAttendance() {
  const btn = document.getElementById('attendance-btn');

  btn.disabled = true;
  btn.textContent = '처리 중...';

  fetch('/attendance/check', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    }
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      let msg = `출석 완료! +${data.base_point}P`;

      if (data.bonus_point > 0) {
        msg += `\n연속 ${data.streak}일 달성 보너스 +${data.bonus_point}P`;
      }

      alert(msg);
      loadMonthData();
    } else {
      alert(data.message || '출석체크에 실패했습니다.');
      loadMonthData();
    }
  })
  .catch(() => {
    alert('서버 오류가 발생했습니다.');
    btn.disabled = false;
    btn.textContent = '출석체크하기';
  });
}

function moveMonth(offset) {
  currentDate.setMonth(currentDate.getMonth() + offset);
  loadMonthData();
}

function goToday() {
  currentDate = new Date();
  loadMonthData();
}

document.addEventListener('DOMContentLoaded', loadMonthData);
</script>

</body>
</html>
