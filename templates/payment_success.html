<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 완료 - KYUBOBOOK</title>
<style>
  :root { --cream:#FAF7F2; --ink:#1A1410; --accent:#C8472B; --gold:#D4A853; --muted:#8C7B6E; --light-border:#E8E0D5; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--cream); font-family:'Malgun Gothic',sans-serif; min-height:100vh; display:flex; flex-direction:column; }
  header { background:#FEFCF8; border-bottom:2px solid var(--ink); padding:14px 40px; display:flex; align-items:center; justify-content:space-between; }
  .logo { font-size:26px; font-weight:700; color:var(--ink); text-decoration:none; }
  .logo span { color:var(--accent); }
  .wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:60px 20px; }
  .card { background:white; border:2px solid var(--ink); padding:60px 56px; text-align:center; max-width:480px; width:100%; animation:fadeIn .4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .icon { font-size:64px; margin-bottom:24px; }
  .title { font-size:26px; font-weight:700; margin-bottom:10px; letter-spacing:-0.5px; }
  .sub { font-size:14px; color:var(--muted); line-height:1.8; margin-bottom:28px; }
  .info-box { background:var(--cream); border:1px solid var(--light-border); padding:16px 20px; margin-bottom:32px; text-align:left; }
  .info-row { display:flex; justify-content:space-between; font-size:13px; padding:6px 0; border-bottom:1px solid var(--light-border); }
  .info-row:last-child { border:none; }
  .info-row .label { color:var(--muted); }
  .info-row .val { font-weight:700; color:var(--ink); }
  .btns { display:flex; gap:10px; justify-content:center; }
  .btn { padding:13px 28px; font-size:13px; font-weight:700; cursor:pointer; font-family:'Malgun Gothic',sans-serif; text-decoration:none; transition:all .2s; border:none; }
  .btn-primary { background:var(--ink); color:white; }
  .btn-primary:hover { background:var(--accent); }
  .btn-outline { background:white; color:var(--ink); border:1.5px solid var(--ink); }
  .btn-outline:hover { background:var(--cream); }
  footer { background:#111; color:rgba(255,255,255,.3); font-size:11px; text-align:center; padding:16px; }
</style>
</head>
<body>
<header>
  <a href="/" class="logo"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="로고" style="height:50px;width:50px;vertical-align:middle;margin-right:8px;object-fit:contain;border-radius:50%;">KYUBO<span>BOOK</span></a>
</header>
<div class="wrap">
  <div class="card">
    <div class="icon">🎉</div>
    <div class="title">결제가 완료됐어요!</div>
    <div class="sub">주문해주셔서 감사합니다.<br>빠르게 출고 준비를 시작할게요.</div>
    <div class="info-box">
      <div class="info-row">
        <span class="label">주문번호</span>
        <span class="val">BN-2025-{{ order_id }}</span>
      </div>
      <div class="info-row">
        <span class="label">결제 금액</span>
        <span class="val">{{ amount }}원</span>
      </div>
      <div class="info-row">
        <span class="label">주문 상태</span>
        <span class="val" style="color:#4CAF50;">결제완료</span>
      </div>
    </div>
    <div class="btns">
      <a href="/mypage" class="btn btn-primary">주문 내역 보기</a>
      <a href="/" class="btn btn-outline">쇼핑 계속하기</a>
    </div>
  </div>
</div>
<footer>© 2025 KYUBOBOOK</footer>
</body>
</html>
